services:
  db:
    image: postgres:15-alpine
    container_name: postgres_python_web_final_proj
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  db_admin:
    image: dpage/pgadmin4
    container_name: postgres_admin_python_web_final_proj
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"

  redis-cache:
    image: redis:7.2-alpine
    container_name: redis_python_web_final_proj
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: python_web_hw_8_app
    restart: unless-stopped
    depends_on:
      - db
      - redis-cache
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redis_data:
